# weread-auto-reader 配置文件
# 复制此文件到 shared/config.yaml 并修改

app:
  name: "weread-auto-reader"
  version: "1.2.0"
  host: "0.0.0.0"
  port: 8000

# 阅读设置
reading:
  target_duration: "60-90"       # 目标阅读时长（分钟，范围格式）
  mode: "smart_random"           # smart_random | sequential | pure_random
  reading_interval: "30-48"      # 每次操作间隔（秒）
  book_continuity: 0.8           # 继续当前书籍概率 (0-1)
  chapter_continuity: 0.7        # 继续当前章节概率 (0-1)
  break_probability: 0.15        # 中途休息概率 (0-1)
  break_duration: "30-180"       # 休息时长（秒）
  books: []                      # 指定书籍列表（空则随机）

# 定时任务
schedule:
  enabled: true
  cron_expression: "0 9,12,18 * * *"
  times: ["09:00", "12:00", "18:00"]
  timezone: "Asia/Shanghai"

# 守护进程
daemon:
  enabled: false
  session_interval: "120-180"    # 会话间隔（分钟）
  max_daily_sessions: 12         # 每日最大会话数

# 网络设置
network:
  timeout: 30                    # 请求超时（秒）
  retry_times: 3                 # 重试次数
  retry_delay: "5-15"            # 重试延迟（秒）
  rate_limit: 10                 # 速率限制（次/分钟）

# 通知设置
notification:
  enabled: false
  include_statistics: true
  only_on_failure: false
  bark:
    enabled: false
    server: "https://api.day.app"
    device_key: ""
  pushplus:
    enabled: false
    token: ""
  telegram:
    enabled: false
    bot_token: ""
    chat_id: ""
  wxpusher:
    enabled: false
    spt: ""
  ntfy:
    enabled: false
    server: "https://ntfy.sh"
    topic: ""
  feishu:
    enabled: false
    webhook_url: ""
    msg_type: "text"
  wework:
    enabled: false
    webhook_url: ""
    msg_type: "text"
  dingtalk:
    enabled: false
    webhook_url: ""
    msg_type: "text"
  gotify:
    enabled: false
    server: ""
    token: ""
    priority: 5
  serverchan3:
    enabled: false
    uid: ""
    sendkey: ""
  pushdeer:
    enabled: false
    pushkey: ""

# 浏览器设置（备用模式）
browser:
  headless: true
  user_agent: ""

# 日志
log:
  level: "INFO"
  file: "shared/logs/weread.log"
  max_size: "10MB"
  backup_count: 5

# 历史记录
history:
  enabled: true
  max_entries: 50

