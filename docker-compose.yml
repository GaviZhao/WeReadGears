services:
  wereadgears:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: wereadgears
    hostname: wereadgears
    ports:
      - "8080:8000"
    volumes:
      - ./shared:/app/shared
      - ./src:/app/src
    environment:
      - TZ=Asia/Shanghai
      - CONFIG_FILE=/app/shared/config.yaml
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G
